version: '3.8'

services:
  # PHP Application
  app:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=bdms
    volumes:
      - .:/var/www/html
    networks:
      - app-network

  # MySQL Database
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=bdms
      - MYSQL_USER=bdms_user
      - MYSQL_PASSWORD=bdms_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database_complete.sql:/docker-entrypoint-initdb.d/database_complete.sql
    networks:
      - app-network
    command: --default-authentication-plugin=mysql_native_password

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
