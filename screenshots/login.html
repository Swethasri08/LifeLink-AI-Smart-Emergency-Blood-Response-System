<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDMS Login - Screenshot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #e74c3c;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .logo p {
            color: #666;
            margin: 0;
        }
        .form-label {
            color: #333;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: linear-gradient(45deg, #c0392b, #e74c3c);
        }
        .badge-demo {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="badge-demo">LIVE DEMO</div>
    <div class="login-container">
        <div class="logo">
            <h1>🩸 BDMS</h1>
            <p>Blood Donation Management System</p>
        </div>
        <form>
            <div class="mb-3">
                <label class="form-label">Select Role</label>
                <select class="form-select">
                    <option>Choose Role</option>
                    <option selected>Donor</option>
                    <option>Blood Bank</option>
                    <option>Hospital</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="john@example.com" value="john@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password" value="••••••••">
            </div>
            <div class="d-grid">
                <button type="button" class="btn btn-primary">Login</button>
            </div>
            <div class="text-center mt-3">
                <a href="#" style="color: #e74c3c; text-decoration: none;">Don't have an account? Register here</a>
            </div>
        </form>
    </div>
</body>
</html>
